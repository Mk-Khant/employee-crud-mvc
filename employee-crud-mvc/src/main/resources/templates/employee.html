<!DOCTYPE html>
<html th:replace="~{layout/masterLayout :: layout(~{::main})}"
 xmlns:th="http://www.thymeleaf.org">

<body>
<main role="main">
	<div class="container mt-5">
		<form th:action="@{/create-employee}" th:object="${employee}"  method="post">
			<div>
				<input type="text" th:field="*{id}"  hidden />
			</div>
			<div class="mb-3">
				<label class="form-label">FirstName</label>
				<input type="text"
				 	th:field="*{firstName}" 
				 class="form-control" />
			</div>
			<div class="mb-3">
				<label class="form-label">LastName</label>
				<input type="text"
				 	th:field="*{lastName}" 
				 class="form-control" />
			</div>
			<div class="mb-3">
				<label class="form-label">Email</label>
				<input type="text"
				 	th:field="*{email}" 
				 class="form-control" />
			</div>
			<div class="mb-3">
				<label class="form-label">Salary</label>
				<input type="text" step="any"
				 	th:field="*{salary}" 
				 class="form-control" />
			</div>
			<div class="mb-3">
				<label class="form-label">Department</label>
				<select class="form-control" th:field="*{department.id}">
					<option th:each="dep : ${departments}" th:value="${dep.id}" th:text="${dep.departmentName}"></option>
				</select>
			</div>
			<input type="submit" th:value="${ id != null ? 'Update Employee' : 'Create Employee'}" class="btn btn-primary w-100 mb-4"  />
		</form>
	</div>
</main>
</body>
</html>

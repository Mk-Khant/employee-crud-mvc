<!DOCTYPE html>
<html th:replace="~{layout/masterLayout :: layout(~{::main})}" 
xmlns:th="http://www.thymeleaf.org">

<body>
<main role="main">
<div class="container mt-5">
	<a th:href="@{/create-employee}" class="btn btn-primary my-3">New Employee</a>
		<table class="table table-striped table-bordered">
			<thead>
				<tr>
					<th>Id</th>
					<th>FirstName</th>
					<th>LastName</th>
					<th>Email</th>
					<th>Salary</th>
					<th>Department</th>
					<th>Action</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="emp : ${employees}">
					<td th:text="${emp.id}"></td>
					<td th:text="${emp.firstName}"></td>
					<td th:text="${emp.lastName}"></td>
					<td th:text="${emp.email}"></td>
					<td th:text="${emp.salary}"></td>
					<td th:text="${emp.department.departmentName}"></td>
					<td><a th:href="@{'/update-employee?id='+${emp.id}}" 
					class="btn btn-primary">Update Employee</a>
					<a th:href="@{'/delete-employee?id='+${emp.id}}"
					class="btn btn-outline-danger">Delete</a></td>
				</tr>
			</tbody>
		</table>
	</div>
</main>
</body>
</html>

<!DOCTYPE html>
<html th:replace="~{layout/masterLayout :: layout(~{::main})}" 
xmlns:th="http://www.thymeleaf.org">
<body>
	<main role="main">
		<div class="container mt-5">
			<div class="row">
				<div class="offset-3 col-md-6">
					<form th:object="${department}" th:action="@{/create-department}" method="post">
						<div class="mb-3">
							<label class="form-label">Department Name</label>
							<input type="text" th:field="*{departmentName}" class="form-control"/>
						</div>
						<input type="submit" value="Save Department" class="btn btn-primary w-100"/>
					</form>
				</div>
			</div>
		</div>
	</main>
</body>
</html>
